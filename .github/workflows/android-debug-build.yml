name: Android Debug Build

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - codex/android-calendar-instances-sync-v1

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON_B64 unavailable; writing CI placeholder config"
            cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "nova-ci-placeholder",
              "storage_bucket": "nova-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.mlainton.nova"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-placeholder-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Build debug APK
        env:
          NOVA_DEV_TOKEN: ${{ secrets.NOVA_DEV_TOKEN || 'ci-placeholder-token' }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: nova-debug-apk
          path: app/build/outputs/apk/debug/*.apk
